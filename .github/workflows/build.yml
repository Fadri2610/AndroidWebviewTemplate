name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    
    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      working-directory: ./01.WebViewStarterTemplate
      run: chmod +x gradlew

    - name: Build with Gradle
      working-directory: ./01.WebViewStarterTemplate
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v5
      with:
        name: app-debug
        path: 01.WebViewStarterTemplate/app/build/outputs/apk/debug/app-debug.apk
