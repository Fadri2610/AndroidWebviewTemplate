name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# Defines the working directory for all 'run' steps to avoid repetition
defaults:
  run:
    working-directory: ./01.WebViewStarterTemplate

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # Optimized Gradle build action
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v4
        with:
          gradle-version: wrapper
          arguments: assembleDebug
          build-root-directory: ./01.WebViewStarterTemplate

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug
          path: 01.WebViewStarterTemplate/app/build/outputs/apk/debug/app-debug.apk
